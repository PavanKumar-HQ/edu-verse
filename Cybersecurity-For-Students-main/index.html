<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberSphere Junior Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #0B0C10;
        color: #E2E8F0;
        font-family: 'Roboto', sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Orbitron', sans-serif;
      }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .pulsing { animation: pulse 1s ease-in-out infinite; }
      @keyframes code-flow {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: 20; }
      }
      .code-line { animation: code-flow 1s linear infinite; }
      
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-2px); }
        50% { transform: translateX(2px); }
        75% { transform: translateX(-2px); }
      }
      .shake { animation: shake 0.3s ease-in-out; }

      @keyframes glitch {
        0% { transform: translate(0, 0); opacity: 1; }
        25% { transform: translate(2px, -2px); opacity: 0.8; }
        50% { transform: translate(-2px, 2px); opacity: 1; }
        75% { transform: translate(2px, 2px); opacity: 0.8; }
        100% { transform: translate(0, 0); opacity: 1; }
      }
      .glitch { animation: glitch 0.2s linear infinite; }
      
      @keyframes shockwave {
        0% { transform: scale(0); opacity: 0.7; }
        100% { transform: scale(2.5); opacity: 0; }
      }
      .shockwave { animation: shockwave 0.5s ease-out; }

    </style>
