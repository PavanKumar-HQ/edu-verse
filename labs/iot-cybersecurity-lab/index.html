
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IoT - How Connected Devices Work</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: #070B1A;
        color: #E6E9F0;
        overflow: hidden;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      .neon-glow-cyan {
        filter: drop-shadow(0 0 4px rgba(59, 240, 255, 0.3));
      }
      .neon-glow-purple {
        filter: drop-shadow(0 0 4px rgba(124, 107, 255, 0.3));
      }
      .neon-glow-green {
        filter: drop-shadow(0 0 4px rgba(0, 255, 163, 0.3));
      }
      .neon-glow-red {
        filter: drop-shadow(0 0 4px rgba(255, 77, 77, 0.3));
      }
      .scanline {
        width: 100%;
        height: 100px;
        z-index: 30;
        background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.01) 50%, rgba(0, 0, 0, 0) 100%);
        opacity: 0.05;
        position: absolute;
        bottom: 100%;
        animation: scanline 10s linear infinite;
        pointer-events: none;
      }
      @keyframes scanline {
        0% { bottom: 100%; }
        100% { bottom: -100px; }
      }
      .noise-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.03;
        pointer-events: none;
        z-index: 40;
      }
      .glass-card {
        background: rgba(13, 19, 44, 0.4);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div class="noise-overlay"></div>
    <div class="scanline"></div>

</body>
</html>
