
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Market Basics Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Space+Grotesk', sans-serif;
      background-color: #070B1A;
      color: #E6E9F0;
      margin: 0;
      overflow: hidden;
    }
    .glass-panel {
      background: rgba(13, 20, 43, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(59, 240, 255, 0.1);
      border-radius: 12px;
    }
    .grid-bg {
      background-image: 
        linear-gradient(rgba(59, 240, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 240, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    @keyframes pulse-soft {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .animate-grid {
      animation: pulse-soft 4s ease-in-out infinite;
    }
  </style>
