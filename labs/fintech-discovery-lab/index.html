
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTech Discovery Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #070B1A;
        color: #E6E9F0;
        margin: 0;
        overflow: hidden;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
      }
      .animated-grid {
        background-image: 
          linear-gradient(rgba(77, 163, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 163, 255, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: grid-move 20s linear infinite;
      }
      @keyframes grid-move {
        from { background-position: 0 0; }
        to { background-position: 50px 50px; }
      }
      .color-glow-overlay {
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        z-index: -1;
        opacity: 0.12;
        filter: blur(100px);
        pointer-events: none;
        transition: background 3s ease-in-out;
        animation: slow-drift 30s ease-in-out infinite alternate;
      }
      @keyframes slow-drift {
        from { transform: translate(0, 0) scale(1); }
        to { transform: translate(5%, 5%) scale(1.1); }
      }
    </style>
