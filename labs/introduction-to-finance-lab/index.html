
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to Finance - Practical Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #070B1A;
            color: #E6E9F0;
            overflow: hidden;
        }
        .grid-bg {
            background-image: 
                linear-gradient(rgba(124, 107, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 107, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .text-income { color: #00FFA3; }
        .text-expense { color: #FF4D4D; }
        .text-savings { color: #3BF0FF; }
        .text-growth { color: #7C6BFF; }
        .bg-income { background-color: #00FFA3; }
        .bg-expense { background-color: #FF4D4D; }
        .bg-savings { background-color: #3BF0FF; }
        .bg-growth { background-color: #7C6BFF; }
        
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
