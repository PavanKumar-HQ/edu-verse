
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Office - Real-World Skills Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #070B1A;
            overflow: hidden;
            color: white;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .glass-panel {
            background: rgba(13, 20, 41, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes grid-move {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }
        .animated-grid {
            background-image: 
                linear-gradient(rgba(43, 127, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(43, 127, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: grid-move 20s linear infinite;
        }

        /* Animation System */
        .animate-in {
            animation-duration: 500ms;
            animation-fill-mode: both;
            animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in { animation-name: fade-in; }

        @keyframes slide-in-from-right {
            from { transform: translateX(3rem); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .slide-in-from-right-12 { animation-name: slide-in-from-right; }

        @keyframes slide-in-from-left {
            from { transform: translateX(-3rem); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .slide-in-from-left-12 { animation-name: slide-in-from-left; }

        @keyframes slide-in-from-bottom {
            from { transform: translateY(2rem); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .slide-in-from-bottom-12 { animation-name: slide-in-from-bottom; }

        @keyframes zoom-in {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .zoom-in { animation-name: zoom-in; }

        @keyframes grow-up {
            from { transform: scaleY(0); transform-origin: bottom; }
            to { transform: scaleY(1); transform-origin: bottom; }
        }
        .animate-grow-up { animation: grow-up 0.8s ease-out forwards; }
    </style>
<script type="importmap">

</html>
